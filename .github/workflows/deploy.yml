name: Build & Deploy

on:
  # Chạy mỗi khi push lên main
  push:
    branches: [main]
  
  # Cho phép trigger thủ công từ GitHub UI
  workflow_dispatch:
  
  # Tự động build mỗi ngày lúc 3:00 UTC (10:00 sáng giờ VN)
  # Để tự động cập nhật khi có app mới trên App Store
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Build site
        run: |
          npm install --no-package-lock || true
          node src/build.js
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
